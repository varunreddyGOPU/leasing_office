services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auburn
      POSTGRES_PASSWORD: auburn
      POSTGRES_DB: auburn_ridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auburn -d auburn_ridge"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://auburn:auburn@postgres:5432/auburn_ridge
      REDIS_URL: redis://redis:6379/0
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-https://ollama.com/api/chat}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:70b}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin}
      UPLOAD_DIR: /app/uploads
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://auburn:auburn@postgres:5432/auburn_ridge
      REDIS_URL: redis://redis:6379/0
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: celery -A worker.celery_app worker --beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  api_uploads:
